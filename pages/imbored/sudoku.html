<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sudoku</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="/aesthetics/styles.css">
<link rel="stylesheet" href="/aesthetics/generate.css">
<link rel="stylesheet" href="sudoku.css"/>


</head>
<body>
    <div id="header-placeholder"></div>

<header>
  <h1>Union County's Daily Sudoku</h1>
  <p class="subtitle">Come back tomorrow for 3 more puzzles!</p>
</header>

<div class="top-row">
  <div class="difficulty">
    <button class="diff-btn" data-clues="50">Easy</button>
    <button class="diff-btn active" data-clues="36">Medium</button>
    <button class="diff-btn" data-clues="28">Hard</button>
  </div>
  <button class="btn accent" id="new-btn">Reset Board</button>
  <button class="btn" id="check-btn">Check</button>
  <span class="timer" id="timer">00:00</span>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="numpad" id="numpad"></div>

<div class="top-row">
  <button class="btn" id="undo-btn">Undo</button>
</div>

<div class="status" id="status"></div>

<script src="sudoku.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">
  import { injectComponents }  from '/components/inject.js';
  
     injectComponents();

</script>

</body>
</html>
